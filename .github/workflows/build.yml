name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-15
            args: --target aarch64-apple-darwin --bundles dmg,app
            rustTarget: aarch64-apple-darwin
            macArch: arm64
            isLinux: false
            isMac: true
          - name: macOS Intel
            os: macos-15-intel
            args: --target x86_64-apple-darwin --bundles dmg,app
            rustTarget: x86_64-apple-darwin
            macArch: x64
            isLinux: false
            isMac: true
          - name: Windows
            os: windows-latest
            args: --bundles nsis
            rustTarget: x86_64-pc-windows-msvc
            isLinux: false
            isMac: false
          - name: Linux
            os: ubuntu-22.04
            args: --bundles appimage,deb
            rustTarget: x86_64-unknown-linux-gnu
            isLinux: true
            isMac: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        if: matrix.isLinux
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Verify Apple release credentials
        if: matrix.isMac && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.MAC_CSC_LINK }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for a signed macOS release"
              missing=1
            fi
          done
          exit "$missing"
      - name: Build, sign, and notarize
        run: pnpm tauri build ${{ matrix.args }}
        env:
          APPLE_CERTIFICATE: ${{ matrix.isMac && secrets.MAC_CSC_LINK || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.isMac && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.isMac && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.isMac && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.isMac && secrets.APPLE_TEAM_ID || '' }}
      - name: Verify macOS signature
        if: matrix.isMac && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: codesign --verify --deep --strict --verbose=2 "$(find src-tauri/target -path '*/release/bundle/macos/Diskloom.app' -print -quit)"
      - name: Prepare macOS release artifacts
        if: matrix.isMac
        shell: bash
        run: |
          mkdir -p release
          cp "$(find src-tauri/target -path '*/release/bundle/dmg/*.dmg' -print -quit)" "release/Diskloom-mac-${{ matrix.macArch }}.dmg"
          ditto -c -k --sequesterRsrc --keepParent "$(find src-tauri/target -path '*/release/bundle/macos/Diskloom.app' -print -quit)" "release/Diskloom-mac-${{ matrix.macArch }}.zip"
      - name: Prepare Windows release artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release
          Copy-Item (Get-ChildItem -Recurse src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1) release/Diskloom-windows-x64.exe
          Compress-Archive -Path src-tauri/target/release/diskloom.exe -DestinationPath release/Diskloom-windows-x64.zip
      - name: Prepare Linux release artifacts
        if: matrix.isLinux
        shell: bash
        run: |
          mkdir -p release
          cp "$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -quit)" release/Diskloom-linux-x86_64.AppImage
          cp "$(find src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)" release/Diskloom-linux-amd64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: Diskloom-${{ matrix.name }}
          path: release/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
