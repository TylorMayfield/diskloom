name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            command: pnpm exec electron-builder --mac --arm64 --publish never
            artifact: dist/*.{dmg,zip}
          - name: macOS Intel
            os: macos-15-intel
            command: pnpm exec electron-builder --mac --x64 --publish never
            artifact: dist/*.{dmg,zip}
          - name: Windows
            os: windows-latest
            command: pnpm exec electron-builder --win --x64 --publish never
            artifact: dist/*.{exe,zip}
          - name: Linux
            os: ubuntu-latest
            command: pnpm exec electron-builder --linux --x64 --publish never
            artifact: dist/*.{AppImage,deb}

    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm exec vite build
      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: Diskloom-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
