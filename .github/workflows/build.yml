name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            isMac: true
            command: pnpm exec electron-builder --mac --arm64 --publish never -c.forceCodeSigning=true
          - name: macOS Intel
            os: macos-15-intel
            isMac: true
            command: pnpm exec electron-builder --mac --x64 --publish never -c.forceCodeSigning=true
          - name: Windows
            os: windows-latest
            isMac: false
            command: pnpm exec electron-builder --win --x64 --publish never
          - name: Linux
            os: ubuntu-latest
            isMac: false
            command: pnpm exec electron-builder --linux --x64 --publish never

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm exec vite build
      - name: Build, sign, and notarize
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.isMac && 'true' || 'false' }}
          CSC_LINK: ${{ matrix.isMac && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.isMac && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.isMac && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.isMac && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.isMac && secrets.APPLE_TEAM_ID || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: Diskloom-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
